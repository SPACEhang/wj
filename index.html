<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>大学生线上学习体验调查问卷</title>
<style>
    body{background:#f5f5f5;font-family:微软雅黑;}
    .survey-box{width:85%;max-width:600px;margin:30px auto;background:#fff;padding:30px;border-radius:8px;}
    h2{text-align:center;color:#333;margin-bottom:30px;}
    .question{margin:22px 0;}
    .q-title{margin-bottom:10px;font-weight:bold;}
    .radio-item{margin:6px 0;}
    textarea{width:100%;height:80px;padding:8px;border:1px #ccc solid;border-radius:4px;box-sizing:border-box;}
    .btn-group{display:flex;gap:4%;margin-top:30px;}
    button{width:48%;padding:14px;border:none;border-radius:4px;font-size:16px;cursor:pointer;}
    .submit-btn{background:#1677ff;color:#fff;}
    .data-btn{background:#36c667;color:#fff;}
</style>
</head>
<body>
<div class="survey-box">
    <h2>大学生线上学习体验调查问卷</h2>
    <form id="surveyForm">
        <div class="question">
            <div class="q-title">1. 你的年级?</div>
            <div class="radio-item"><input type="radio" name="grade" value="大一"> 大一</div>
            <div class="radio-item"><input type="radio" name="grade" value="大二"> 大二</div>
            <div class="radio-item"><input type="radio" name="grade" value="大三"> 大三</div>
            <div class="radio-item"><input type="radio" name="grade" value="大四"> 大四</div>
        </div>

        <div class="question">
            <div class="q-title">2. 每周线上课程时长?</div>
            <div class="radio-item"><input type="radio" name="study_time" value="0-5小时"> 0-5小时</div>
            <div class="radio-item"><input type="radio" name="study_time" value="5-10小时"> 5-10小时</div>
            <div class="radio-item"><input type="radio" name="study_time" value="10-15小时"> 10-15小时</div>
            <div class="radio-item"><input type="radio" name="study_time" value="15小时以上"> 15小时以上</div>
        </div>

        <div class="question">
            <div class="q-title">3. 线上课堂学习效果自评?</div>
            <div class="radio-item"><input type="radio" name="effect" value="很差"> 很差</div>
            <div class="radio-item"><input type="radio" name="effect" value="一般"> 一般</div>
            <div class="radio-item"><input type="radio" name="effect" value="良好"> 良好</div>
            <div class="radio-item"><input type="radio" name="effect" value="优秀"> 优秀</div>
        </div>

        <div class="question">
            <div class="q-title">4. 线上学习最大阻碍（多选）</div>
            <div class="radio-item"><input type="checkbox" name="barrier" value="网络卡顿"> 网络卡顿</div>
            <div class="radio-item"><input type="checkbox" name="barrier" value="自制力差容易走神"> 自制力差容易走神</div>
            <div class="radio-item"><input type="checkbox" name="barrier" value="师生互动不足"> 师生互动不足</div>
            <div class="radio-item"><input type="checkbox" name="barrier" value="电子设备老旧"> 电子设备老旧</div>
        </div>

        <div class="question">
            <div class="q-title">5. 对线上教学改进建议（简答）</div>
            <textarea name="suggest" placeholder="请输入你的建议..."></textarea>
        </div>

        <div class="btn-group">
            <button class="submit-btn" type="submit">提交问卷</button>
            <button class="data-btn" type="button" onclick="window.open('数据分析汇总.png')">查看数据分析统计</button>
        </div>
    </form>
</div>

<script>
const form = document.getElementById('surveyForm');
form.addEventListener('submit',(e)=>{
    e.preventDefault();
    alert('问卷提交模拟成功！线上静态页面仅展示页面，本地运行Python后端可实现真实数据存储');
    form.reset();
})
</script>
</body>
</html>
